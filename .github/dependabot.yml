version: 2

updates:
  # Python dependencies
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - python
    groups:
      python-runtime:
        patterns:
          - "python-telegram-bot*"
          - "pydantic*"
          - "pexpect"
          - "gitpython"
          - "openai"
          - "anthropic"
          - "ollama"
          - "requests"
      python-dev:
        dependency-type: development
        patterns:
          - "pytest*"
          - "ruff"
          - "coverage"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions

  # Docker base image
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    labels:
      - dependencies
      - docker

  # npm globals (@github/copilot, @openai/codex) — manifest in package.json
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
