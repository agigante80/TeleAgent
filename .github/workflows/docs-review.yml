name: Docs review

on:
  pull_request:
    paths:
      - 'docs/features/**'

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Validate feature docs
        run: |
          for f in $(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^docs/features/.*\.md$' || true); do
            echo "Validating $f";
            python scripts/validate_feature_doc.py "$f";
          done

      - name: Add docs-reviewed label
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            await github.issues.addLabels({owner: context.repo.owner, repo: context.repo.repo, issue_number: pr, labels: ['docs-reviewed']});
