name: Main Gate

# Runs on every push to main.
# Three checks must all pass before Docker publish is allowed:
#   1. Version in VERSION file is bumped vs the latest git tag
#   2. Full test suite passes
#   3. Docker image builds successfully

on:
  push:
    branches: [main]

jobs:
  version-check:
    name: Version bumped?
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for tags

      - name: Verify VERSION is bumped
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          if [ -z "$LATEST_TAG" ]; then
            echo "✅ No release tags yet — first release, version $VERSION is fine."
            exit 0
          fi

          TAG_VERSION="${LATEST_TAG#v}"
          echo "VERSION file : $VERSION"
          echo "Latest tag   : $LATEST_TAG ($TAG_VERSION)"

          if [ "$VERSION" = "$TAG_VERSION" ]; then
            echo ""
            echo "❌ VERSION ($VERSION) matches the latest release tag ($LATEST_TAG)."
            echo "   Bump the version in the VERSION file before merging to main."
            exit 1
          fi

          echo "✅ Version $VERSION is new (latest released: $TAG_VERSION)"

  tests:
    name: Full test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check src/

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
